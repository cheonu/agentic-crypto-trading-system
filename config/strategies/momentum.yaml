strategy:
  name: momentum
  description: "Trend-following momentum strategy"
  timeframes: ["1h", "4h"]
  indicators:
    - name: adx
      period: 14
      threshold: 25
    - name: rsi
      period: 14
      overbought: 70
      oversold: 30
  entry_rules:
    - condition: "adx > 25 AND rsi < 70"
      action: buy
    - condition: "adx > 25 AND rsi > 30"
      action: sell
  exit_rules:
    - condition: "adx < 20"
      action: close
  risk:
    stop_loss_pct: 0.02
    take_profit_pct: 0.06
    max_position_size: 0.20
