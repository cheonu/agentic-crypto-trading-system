app:
  name: "Agentic Crypto Trading System"
  environment: development

database:
  postgres:
    host: localhost
    port: 5432
    name: trading_db

  redis:
    host: localhost
    port: 6379

vector_db:
  provider: chroma
  path: ./vector_store

exchanges:
  default: binance

risk:
  max_position_size_usd: 10000.0
  max_position_size_pct: 0.05
  max_portfolio_exposure_pct: 0.30
  max_daily_loss_usd: 5000.0
  max_daily_loss_pct: 0.10
  max_leverage: 3.0
  var_limit_95: 0.15
  stop_loss_pct: 0.02

agents:
  enabled: true

api:
  host: 0.0.0.0
  port: 8000

logging:
  level: INFO