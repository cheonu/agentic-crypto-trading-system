# Default values for crypto-trader

replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/project-e4ad9f18-82a4-4e98-ae4/crypto-trader/crypto-trader
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: crypto-trader-sa
  annotations:
    iam.gke.io/gcp-service-account: crypto-trader-sa@project-e4ad9f18-82a4-4e98-ae4.iam.gserviceaccount.com

# Deploy 3 trading instances with minimal resources for free tier
traders:
  - name: langgraph-baseline
    mode: langgraph
    symbol: BTC/USDT
    interval: "300"
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 1Gi

  - name: crewai-openai
    mode: crewai
    symbol: BTC/USDT
    interval: "300"
    llmProvider: openai
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 1Gi

  - name: crewai-anthropic
    mode: crewai
    symbol: BTC/USDT
    interval: "300"
    llmProvider: anthropic
    sentimentModel: "ElKulako/cryptobert"  # A/B group A — baseline
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 1Gi

  # A/B test: same config as crewai-anthropic but with fine-tuned sentiment model
  # Uncomment and set sentimentModel after fine-tuning is complete
  # - name: crewai-anthropic-finetuned
  #   mode: crewai
  #   symbol: BTC/USDT
  #   interval: "300"
  #   llmProvider: anthropic
  #   sentimentModel: "your-username/finbert-crypto"  # A/B group B — fine-tuned
  #   resources:
  #     requests:
  #       cpu: 50m
  #       memory: 256Mi
  #     limits:
  #       cpu: 200m
  #       memory: 1Gi

  - name: crewai-gemini
    mode: crewai
    symbol: BTC/USDT
    interval: "300"
    llmProvider: google
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 1Gi

  - name: crewai-deepseek
    mode: crewai
    symbol: BTC/USDT
    interval: "300"
    llmProvider: deepseek
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 1Gi

  - name: crewai-grok
    mode: crewai
    symbol: BTC/USDT
    interval: "300"
    llmProvider: grok
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 1Gi

  # Multi-symbol comparison (using best-performing provider: Anthropic)
  - name: eth-anthropic
    mode: crewai
    symbol: ETH/USDT
    interval: "300"
    llmProvider: anthropic
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 1Gi

  - name: sol-anthropic
    mode: crewai
    symbol: SOL/USDT
    interval: "300"
    llmProvider: anthropic
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 1Gi

secrets:
  openaiKey: openai-api-key
  anthropicKey: anthropic-api-key
  googleAiKey: google-ai-key
  deepseekKey: deepseek-api-key
  xaiKey: xai-api-key

testnet:
  enabled: "false"
  regimeThreshold: "0.3"  # Lower = more trades. Default 2.0 for production, 0.3 for testing
