# Default values for crypto-trader

replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/project-1d27d756-d198-495b-b0f/crypto-trader/crypto-trader
  tag: latest
  pullPolicy: Always

serviceAccount:
  name: crypto-trader-sa
  annotations:
    iam.gke.io/gcp-service-account: crypto-trader-sa@project-1d27d756-d198-495b-b0f.iam.gserviceaccount.com

# Production: single best-performing agent
traders:
  - name: crewai-grok
    mode: crewai
    symbol: BTC/CAD
    interval: "300"
    llmProvider: grok
    sentimentModel: "ElKulako/cryptobert"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

secrets:
  openaiKey: openai-api-key
  anthropicKey: anthropic-api-key
  googleAiKey: google-ai-key
  deepseekKey: deepseek-api-key
  xaiKey: xai-api-key

liveTrading:
  enabled: "true"
  regimeThreshold: "0.3"
